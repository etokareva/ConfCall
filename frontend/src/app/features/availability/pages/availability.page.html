<ccs-navbar></ccs-navbar>
<div class="page-container">
  <div class="availability-page">
    <h1 class="sr-only">{{ "availability.page_title" | t }}</h1>

    <section class="section calendar-section">
      <div class="page-context">
        <strong>{{ "availability.page_title" | t }}</strong>
        <span>{{ "availability.page_subtitle" | t }}</span>
      </div>
      <div class="calendar-toolbar">
        <div class="calendar-nav">
          <button type="button" class="nav-button" (click)="goToToday()">
            {{ "common.today" | t }}
          </button>
          <div class="nav-arrows">
            <button
              type="button"
              class="nav-icon"
              (click)="goToPreviousMonth()"
              [attr.aria-label]="'availability.previous_month' | t"
            >
              <svg-icon name="chevron-left"></svg-icon>
            </button>
            <button
              type="button"
              class="nav-icon"
              (click)="goToNextMonth()"
              [attr.aria-label]="'availability.next_month' | t"
            >
              <svg-icon name="chevron-right"></svg-icon>
            </button>
          </div>
          <h2>{{ monthLabel() }}</h2>
        </div>

        <div class="calendar-toolbar-right">
          <div
            class="calendar-legend"
            [attr.aria-label]="'availability.legend' | t"
          >
            <span
              class="legend-marker"
              [ccsTooltip]="'availability.free_tooltip' | t"
              [attr.aria-label]="'availability.free_slot' | t"
              tabindex="0"
            >
              <i class="legend-dot free"></i>
              <span>{{ "availability.free" | t }}</span>
            </span>
            <span
              class="legend-marker"
              [ccsTooltip]="'availability.busy_tooltip' | t"
              [attr.aria-label]="'availability.busy_slot' | t"
              tabindex="0"
            >
              <i class="legend-dot busy"></i>
              <span>{{ "availability.busy" | t }}</span>
            </span>
          </div>
        </div>
      </div>
      <ccs-availability-month-grid
        [weekdays]="weekdays"
        [monthCells]="monthCells()"
        [focusedDateKey]="focusedDateKey()"
        (dayOpen)="openDayDetails($event)"
        (dayAdd)="openDateDialog($event)"
        (dateFocus)="setFocusedDate($event)"
        (dateKeydown)="handleCalendarDayKeydown($event.event, $event.cell)"
        (itemOpen)="openCalendarItem($event.item, $event.date, $event.event)"
      ></ccs-availability-month-grid>
    </section>

    @if (editorOpen() && editorData(); as editor) {
    <div class="editor-backdrop" (click)="closeDateDialog()">
      <div class="editor-shell" (click)="$event.stopPropagation()">
        <ccs-availability-event-dialog
          [data]="editor"
          (cancel)="closeDateDialog()"
          (save)="saveDateDialog($event)"
        ></ccs-availability-event-dialog>
      </div>
    </div>
    } @if (dayDetailsOpen() && selectedDay(); as day) {
    <div class="editor-backdrop" (click)="closeDayDetails()">
      <aside class="day-details-shell" (click)="$event.stopPropagation()">
        <ccs-availability-day-details
          [day]="day"
          (close)="closeDayDetails()"
          (addSlot)="openDateDialog($event)"
          (itemOpen)="openCalendarItem($event.item, $event.date, $event.event)"
          (itemRemove)="removeCalendarItem($event.item, $event.event)"
          (meetingOpen)="openMeetingDialog($event.item, $event.event)"
        ></ccs-availability-day-details>
      </aside>
    </div>
    }
  </div>
</div>
