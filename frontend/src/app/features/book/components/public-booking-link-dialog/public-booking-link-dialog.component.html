<form class="dialog-shell" [formGroup]="form" (ngSubmit)="submit()">
  <ccs-modal-shell
    title="book.public_link_dialog.title"
    [subtitle]="data.groupName + ' | ' + data.participantsLabel"
    (close)="close()"
  >
    <div class="dialog-summary">
      <span class="summary-item">
        <small>{{ "book.step.group.title" | t }}</small>
        <strong>{{ data.groupName }}</strong>
      </span>
      <span class="summary-item">
        <small>{{ "book.step.participants.title" | t }}</small>
        <strong>{{ data.participantsLabel }}</strong>
      </span>
    </div>

    <div class="form-grid">
      <div class="form-group">
        <label for="public-link-dialog-title">
          {{ "settings.link_title" | t }}
        </label>
        <input
          id="public-link-dialog-title"
          name="public-link-dialog-title"
          class="control-input"
          type="text"
          formControlName="title"
          [placeholder]="'groups.booking_link_title_placeholder' | t"
        />
      </div>

      <div class="form-group">
        <label id="public-link-dialog-duration-label">
          {{ "settings.meeting_duration" | t }}
        </label>
        <div class="duration-select">
          <button
            #durationTrigger="cdkOverlayOrigin"
            cdkOverlayOrigin
            class="select-trigger"
            type="button"
            aria-haspopup="listbox"
            [attr.aria-labelledby]="'public-link-dialog-duration-label'"
            [attr.aria-expanded]="durationOpen()"
            [class.open]="durationOpen()"
            (click)="toggleDuration()"
          >
            <span class="select-label">
              {{ "duration." + form.controls.durationMinutes.value | t }}
            </span>
            <svg-icon class="select-chevron" name="chevron-down"></svg-icon>
          </button>

          <ng-template
            cdkConnectedOverlay
            [cdkConnectedOverlayOrigin]="durationTrigger"
            [cdkConnectedOverlayOpen]="durationOpen()"
            [cdkConnectedOverlayPositions]="durationOverlayPositions"
            [cdkConnectedOverlayHasBackdrop]="true"
            [cdkConnectedOverlayWidth]="
              durationTrigger.elementRef.nativeElement.offsetWidth
            "
            [cdkConnectedOverlayPush]="true"
            cdkConnectedOverlayBackdropClass="select-overlay-backdrop"
            (backdropClick)="closeDuration()"
            (detach)="closeDuration()"
          >
            <div
              class="select-menu"
              role="listbox"
              [attr.aria-label]="'settings.meeting_duration' | t"
            >
              @for (duration of durationOptions; track duration) {
                <button
                  type="button"
                  role="option"
                  [class.selected]="
                    form.controls.durationMinutes.value === duration
                  "
                  [attr.aria-selected]="
                    form.controls.durationMinutes.value === duration
                  "
                  (click)="selectDuration(duration)"
                >
                  {{ "duration." + duration | t }}
                </button>
              }
            </div>
          </ng-template>
        </div>
      </div>
    </div>

    <div class="form-group">
      <label for="public-link-dialog-description">
        {{ "settings.optional_description" | t }}
      </label>
      <textarea
        id="public-link-dialog-description"
        name="public-link-dialog-description"
        class="control-input"
        formControlName="description"
        rows="3"
        [placeholder]="'groups.booking_link_description_placeholder' | t"
      ></textarea>
    </div>

    <div modalFooter class="dialog-actions">
      <button class="btn-secondary" type="button" (click)="close()">
        {{ "common.cancel" | t }}
      </button>
      <button class="btn-primary" type="submit" [disabled]="form.invalid">
        {{ "settings.create_link" | t }}
      </button>
    </div>
  </ccs-modal-shell>
</form>
