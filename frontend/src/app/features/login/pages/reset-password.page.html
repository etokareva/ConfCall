<div class="reset-page">
  <div class="reset-card">
    <p class="eyebrow">{{ "login.reset_tab" | t }}</p>
    <h1>{{ "login.reset_title" | t }}</h1>
    <p class="subtitle">{{ "login.reset_page_help" | t }}</p>

    @if (loading()) {
    <p class="state">{{ "login.verification_loading" | t }}</p>
    } @else {
    <form [formGroup]="form" (ngSubmit)="save()">
      <div class="form-group">
        <label for="reset-password">{{ "login.new_password" | t }}</label>
        <input
          id="reset-password"
          name="reset-password"
          type="password"
          formControlName="password"
          [placeholder]="'login.new_password_placeholder' | t"
          autocomplete="new-password"
        />
      </div>

      <div class="form-group">
        <label for="reset-password-confirm">
          {{ "login.confirm_password" | t }}
        </label>
        <input
          id="reset-password-confirm"
          name="reset-password-confirm"
          type="password"
          formControlName="confirmPassword"
          [placeholder]="'login.confirm_password_placeholder' | t"
          autocomplete="new-password"
        />
      </div>

      <button class="btn-primary" type="submit">
        {{ (saving() ? "login.resetting" : "login.save_new_password") | t }}
      </button>
    </form>
    } @if (error()) {
    <p class="error" role="alert">{{ error() }}</p>
    } @if (done()) {
    <p class="success" role="status" aria-live="polite">
      {{ "login.reset_success_message" | t }}
    </p>
    }

    <a routerLink="/login" class="back-link">{{ "login.back_to_login" | t }}</a>
  </div>
</div>
