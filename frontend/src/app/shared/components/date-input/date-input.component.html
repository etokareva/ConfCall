<div #positionAnchor class="date-input">
  <input
    #input
    type="text"
    class="control-input control-input--with-icon"
    [id]="inputId || null"
    [name]="name || inputId || null"
    [disabled]="disabled"
    [attr.aria-label]="label | t"
    [attr.aria-describedby]="describedBy || null"
    aria-haspopup="dialog"
    (input)="onInput($event)"
    (keydown)="onInputKeydown($event)"
    (click)="openPickerFromInput()"
    (focus)="openPickerFromInput()"
    (blur)="markTouched()"
  />
  <button
    type="button"
    class="icon-button date-picker-toggle date-toggle"
    [disabled]="disabled"
    [attr.aria-label]="openLabel | t"
    aria-haspopup="dialog"
    [attr.aria-expanded]="isOpen()"
    (mousedown)="openPicker($event)"
    (click)="openPicker($event)"
  >
    <svg-icon name="calendar"></svg-icon>
  </button>
</div>
