<div class="time-select">
  <input
    #timeInput
    #trigger="cdkOverlayOrigin"
    cdkOverlayOrigin
    type="text"
    class="control-input control-input--with-icon"
    [id]="inputId || null"
    [name]="name || inputId || null"
    inputmode="numeric"
    maxlength="5"
    [value]="value"
    [disabled]="disabled"
    [attr.aria-label]="label | t"
    (input)="onInput($event)"
    (blur)="markTouched()"
  />
  <button
    type="button"
    class="icon-button time-trigger"
    aria-haspopup="listbox"
    [attr.aria-label]="label | t"
    [attr.aria-expanded]="open()"
    [class.open]="open()"
    [disabled]="disabled"
    (click)="toggle()"
  >
    <svg-icon name="chevron-down" aria-hidden="true"></svg-icon>
  </button>
  <ng-template
    cdkConnectedOverlay
    [cdkConnectedOverlayOrigin]="trigger"
    [cdkConnectedOverlayOpen]="open()"
    [cdkConnectedOverlayPositions]="overlayPositions"
    [cdkConnectedOverlayHasBackdrop]="true"
    [cdkConnectedOverlayWidth]="menuWidth()"
    [cdkConnectedOverlayPush]="true"
    [cdkConnectedOverlayFlexibleDimensions]="true"
    cdkConnectedOverlayBackdropClass="select-overlay-backdrop"
    (backdropClick)="close()"
  >
    <div
      class="time-menu popover-panel popover-scroll"
      role="listbox"
      [attr.aria-label]="label | t"
    >
      @for (option of options; track option.value) {
        <button
          class="popover-option"
          type="button"
          role="option"
          [attr.aria-selected]="option.value === value"
          [class.selected]="option.value === value"
          (click)="select(option.value)"
        >
          {{ option.label }}
        </button>
      }
    </div>
  </ng-template>
</div>
