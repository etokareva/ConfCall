<div class="toast-stack" aria-live="polite" aria-atomic="true">
  @for (item of toast.toasts(); track item.id) {
    <article
      class="toast"
      [class]="item.kind"
      [attr.role]="item.kind === 'error' ? 'alert' : 'status'"
    >
      <svg-icon [name]="iconName(item.kind)" aria-hidden="true"></svg-icon>
      <div class="toast-body">
        <strong>{{ item.title }}</strong>
        <span>{{ item.message }}</span>
      </div>
      <button
        type="button"
        class="toast-close"
        [attr.aria-label]="'common.close_notification' | t"
        (click)="toast.dismiss(item.id)"
      >
        ×
      </button>
    </article>
  }
</div>
